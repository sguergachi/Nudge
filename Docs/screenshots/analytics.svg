<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580" width="420" height="580">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="16" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4CAF50" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="barGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <linearGradient id="barRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F44336"/>
      <stop offset="100%" stop-color="#D32F2F"/>
    </linearGradient>
  </defs>

  <!-- Window shadow layer -->
  <rect x="2" y="2" width="420" height="580" rx="14" ry="14" fill="#000" opacity="0.3" filter="url(#shadow)"/>

  <!-- Window background -->
  <rect x="0" y="0" width="420" height="580" rx="12" ry="12" fill="#19191C"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="419" height="579" rx="11.5" ry="11.5" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="420" height="48" rx="12" ry="12" fill="#1C1C20"/>
  <rect x="0" y="24" width="420" height="24" fill="#1C1C20"/>

  <!-- Title -->
  <text x="18" y="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#F0F0F5" font-weight="600">Nudge</text>

  <!-- Header buttons -->
  <circle cx="388" cy="24" r="7" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.2"/>
  <circle cx="388" cy="24" r="4" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <line x1="404" y1="18" x2="404" y2="30" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="398" y1="24" x2="410" y2="24" stroke="rgba(255,255,255,0.2)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Tab bar -->
  <rect x="0" y="48" width="420" height="36" fill="#19191C"/>

  <!-- Active tab -->
  <text x="28" y="71" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#58A6FF" font-weight="600">Activity</text>
  <line x1="20" y1="82" x2="72" y2="82" stroke="#58A6FF" stroke-width="2" stroke-linecap="round"/>

  <!-- Inactive tabs -->
  <text x="92" y="71" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#9696A0" font-weight="500">Timeline</text>
  <text x="162" y="71" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#9696A0" font-weight="500">AI Brain</text>

  <!-- Divider -->
  <line x1="155" y1="56" x2="155" y2="76" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Line: window_title tab_divider -->
  <line x1="0" y1="84" x2="420" y2="84" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stat cards -->
  <!-- Card 1: Activity Score -->
  <rect x="16" y="100" width="122" height="72" rx="8" ry="8" fill="rgba(255,255,255,0.055)"/>
  <text x="28" y="118" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#9696A0" font-weight="400">Today's Activity</text>
  <text x="28" y="152" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" fill="#F0F0F5" font-weight="600">4.2h</text>

  <!-- Card 2: Productive % -->
  <rect x="149" y="100" width="122" height="72" rx="8" ry="8" fill="rgba(255,255,255,0.055)"/>
  <text x="161" y="118" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#9696A0" font-weight="400">Productive</text>
  <text x="161" y="152" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" fill="#4CAF50" font-weight="600">78%</text>

  <!-- Card 3: Apps Tracked -->
  <rect x="282" y="100" width="122" height="72" rx="8" ry="8" fill="rgba(255,255,255,0.055)"/>
  <text x="294" y="118" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#9696A0" font-weight="400">Apps Today</text>
  <text x="294" y="152" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19" fill="#F0F0F5" font-weight="600">7</text>

  <!-- Productivity by Hour section -->
  <text x="18" y="210" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#9696A0" font-weight="500">PRODUCTIVITY TODAY</text>

  <!-- Hourly bars -->
  <g transform="translate(18, 222)">
    <!-- Bar 1: 9AM -->
    <rect x="0" y="20" width="20" height="40" rx="2" ry="2" fill="#232328"/>
    <rect x="0" y="32" width="20" height="28" rx="2" ry="2" fill="url(#barGreen)"/>
    <text x="10" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">9</text>

    <!-- Bar 2: 10AM -->
    <rect x="30" y="10" width="20" height="50" rx="2" ry="2" fill="#232328"/>
    <rect x="30" y="18" width="20" height="42" rx="2" ry="2" fill="url(#barGreen)"/>
    <text x="40" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">10</text>

    <!-- Bar 3: 11AM -->
    <rect x="60" y="5" width="20" height="55" rx="2" ry="2" fill="#232328"/>
    <rect x="60" y="5" width="20" height="55" rx="2" ry="2" fill="url(#barGreen)"/>
    <text x="70" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">11</text>

    <!-- Bar 4: 12PM -->
    <rect x="90" y="12" width="20" height="48" rx="2" ry="2" fill="#232328"/>
    <rect x="90" y="12" width="20" height="48" rx="2" ry="2" fill="url(#barGreen)"/>
    <text x="100" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">12</text>

    <!-- Bar 5: 1PM -->
    <rect x="120" y="30" width="20" height="30" rx="2" ry="2" fill="#232328"/>
    <rect x="120" y="46" width="20" height="14" rx="2" ry="2" fill="url(#barRed)"/>
    <text x="130" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">1</text>

    <!-- Bar 6: 2PM -->
    <rect x="150" y="8" width="20" height="52" rx="2" ry="2" fill="#232328"/>
    <rect x="150" y="8" width="20" height="52" rx="2" ry="2" fill="url(#barGreen)"/>
    <text x="160" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">2</text>

    <!-- Bar 7: 3PM -->
    <rect x="180" y="15" width="20" height="45" rx="2" ry="2" fill="#232328"/>
    <rect x="180" y="20" width="20" height="40" rx="2" ry="2" fill="url(#barGreen)"/>
    <text x="190" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">3</text>

    <!-- Bar 8: 4PM -->
    <rect x="210" y="22" width="20" height="38" rx="2" ry="2" fill="#232328"/>
    <rect x="210" y="35" width="20" height="25" rx="2" ry="2" fill="url(#barGreen)"/>
    <text x="220" y="74" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#787882" text-anchor="middle">4</text>
  </g>

  <!-- Most Used Apps section -->
  <text x="18" y="320" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#9696A0" font-weight="500">MOST USED APPS</text>

  <!-- App 1: VS Code -->
  <rect x="16" y="336" width="388" height="28" rx="6" ry="6" fill="rgba(255,255,255,0.04)"/>
  <circle cx="32" cy="350" r="4" fill="#B48CFF"/>
  <text x="44" y="354" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#F0F0F5" font-weight="500">Visual Studio Code</text>
  <rect x="300" y="340" width="100" height="20" rx="2.5" ry="2.5" fill="#232328"/>
  <rect x="300" y="340" width="72" height="20" rx="2.5" ry="2.5" fill="#4CAF50" opacity="0.6"/>
  <text x="370" y="354" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#787882" text-anchor="end">2.1h</text>

  <!-- App 2: Terminal -->
  <rect x="16" y="368" width="388" height="28" rx="6" ry="6" fill="rgba(255,255,255,0.04)"/>
  <circle cx="32" cy="382" r="4" fill="#58A6FF"/>
  <text x="44" y="386" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#F0F0F5" font-weight="500">Terminal</text>
  <rect x="300" y="372" width="100" height="20" rx="2.5" ry="2.5" fill="#232328"/>
  <rect x="300" y="372" width="52" height="20" rx="2.5" ry="2.5" fill="#4CAF50" opacity="0.6"/>
  <text x="370" y="386" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#787882" text-anchor="end">1.3h</text>

  <!-- App 3: Slack -->
  <rect x="16" y="400" width="388" height="28" rx="6" ry="6" fill="rgba(255,255,255,0.04)"/>
  <circle cx="32" cy="414" r="4" fill="#FFC107"/>
  <text x="44" y="418" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#F0F0F5" font-weight="500">Slack</text>
  <rect x="300" y="404" width="100" height="20" rx="2.5" ry="2.5" fill="#232328"/>
  <rect x="300" y="404" width="62" height="20" rx="2.5" ry="2.5" fill="#FFC107" opacity="0.5"/>
  <text x="370" y="418" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#787882" text-anchor="end">0.9h</text>

  <!-- Score summary at bottom -->
  <rect x="16" y="452" width="388" height="72" rx="10" ry="10" fill="#1C1C20"/>
  <text x="28" y="474" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#9696A0" font-weight="500">FOCUS SCORE</text>
  <text x="28" y="510" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" fill="#4CAF50" font-weight="700">78%</text>
  <text x="108" y="510" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#9696A0" font-weight="400">Productive today — consistent morning focus.</text>

  <!-- Dots showing productive/unproductive moments -->
  <g transform="translate(28, 440)">
    <circle cx="0" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="12" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="24" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="36" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="48" cy="0" r="3" fill="#F44336"/>
    <circle cx="60" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="72" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="84" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="96" cy="0" r="3" fill="#FFC107"/>
    <circle cx="108" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="120" cy="0" r="3" fill="#4CAF50"/>
    <circle cx="132" cy="0" r="3" fill="#4CAF50"/>
  </g>

  <!-- Powered by -->
  <text x="210" y="562" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="7.5" fill="rgba(100,180,255,0.31)" text-anchor="middle" font-weight="400">POWERED BY NUDGE AI v2.1.0</text>
</svg>
