name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - docs/**
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Test
        working-directory: NudgeCrossPlatform
        run: dotnet test NudgeCrossPlatform.Tests/NudgeCrossPlatform.Tests.csproj --nologo -v normal

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        working-directory: NudgeCrossPlatform
        run: |
          # Sequential restore+build (shared obj/ overwrites on each restore)
          rm -rf obj
          dotnet restore nudge.csproj --nologo
          dotnet build nudge.csproj -c Release -f net10.0 --no-restore --nologo

          rm -rf obj
          dotnet restore nudge-notify.csproj --nologo
          dotnet build nudge-notify.csproj -c Release -f net10.0 --no-restore --nologo

          rm -rf obj
          dotnet restore nudge-tray.csproj --nologo
          dotnet build nudge-tray.csproj -c Release -f net10.0 --no-restore --nologo

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build
        shell: bash
        working-directory: NudgeCrossPlatform
        run: |
          rm -rf obj
          dotnet restore nudge.csproj --nologo
          dotnet build nudge.csproj -c Release -f net10.0 --no-restore --nologo

          rm -rf obj
          dotnet restore nudge-notify.csproj --nologo
          dotnet build nudge-notify.csproj -c Release -f net10.0 --no-restore --nologo

          rm -rf obj
          dotnet restore nudge-tray.csproj --nologo
          dotnet build nudge-tray.csproj -c Release -f net10.0-windows10.0.17763.0 --no-restore --nologo
