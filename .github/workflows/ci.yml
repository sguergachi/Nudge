name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # nudge.csproj has a ProjectReference to WaylandDotnet (sibling repo, local dev only).
      # On Linux CI we skip it; nudge-tray and nudge-notify have no such dependency.
      - name: Restore (Linux)
        if: runner.os == 'Linux'
        working-directory: NudgeCrossPlatform
        run: |
          dotnet restore nudge-notify.csproj --nologo
          dotnet restore nudge-tray.csproj --nologo
          dotnet restore NudgeCrossPlatform.Tests/NudgeCrossPlatform.Tests.csproj --nologo

      - name: Restore (Windows)
        if: runner.os == 'Windows'
        working-directory: NudgeCrossPlatform
        run: |
          dotnet restore nudge.csproj --nologo
          dotnet restore nudge-notify.csproj --nologo
          dotnet restore nudge-tray.csproj --nologo
          dotnet restore NudgeCrossPlatform.Tests/NudgeCrossPlatform.Tests.csproj --nologo

      - name: Build (Linux)
        if: runner.os == 'Linux'
        working-directory: NudgeCrossPlatform
        run: |
          dotnet build nudge-notify.csproj -c Release -f net10.0 --no-restore --nologo
          dotnet build nudge-tray.csproj   -c Release -f net10.0 --no-restore --nologo -p:SkipBuildNudgeDaemon=true

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: NudgeCrossPlatform
        run: |
          dotnet build nudge.csproj        -c Release -f net10.0                      --no-restore --nologo
          dotnet build nudge-notify.csproj -c Release -f net10.0                      --no-restore --nologo
          dotnet build nudge-tray.csproj   -c Release -f net10.0-windows10.0.17763.0  --no-restore --nologo

      - name: Test
        working-directory: NudgeCrossPlatform
        run: dotnet test NudgeCrossPlatform.Tests/NudgeCrossPlatform.Tests.csproj -c Release --no-restore --nologo -v quiet
