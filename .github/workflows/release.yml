name: Release

on:
  push:
    branches: [master]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Extract version and check if release needed
        id: ver
        run: |
          VERSION=$(grep -oP 'const string VERSION = "\K[^"]+' NudgeCrossPlatform/nudge-tray.cs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q "v$VERSION"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists — skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New version v$VERSION — will create release."
          fi

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained Windows binaries
        working-directory: NudgeCrossPlatform
        run: |
          dotnet publish nudge.csproj        -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o dist/win --nologo
          dotnet publish nudge-notify.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o dist/win --nologo
          dotnet publish nudge-tray.csproj   -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -f net10.0-windows10.0.17763.0 -p:SkipBuildNudgeDaemon=true -o dist/win --nologo

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $dist = "NudgeCrossPlatform/dist/win"
          Copy-Item "NudgeCrossPlatform/model_inference.py"       $dist
          Copy-Item "NudgeCrossPlatform/train_model.py"           $dist
          Copy-Item "NudgeCrossPlatform/background_trainer.py"    $dist
          Copy-Item "NudgeCrossPlatform/requirements-cpu.txt"     $dist
          Copy-Item "NudgeCrossPlatform/requirements.txt"         $dist
          Copy-Item "NudgeCrossPlatform/assets/windows/nudge.ico" $dist
          Compress-Archive -Path "$dist/*" -DestinationPath "nudge-win-x64.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: nudge-win-x64
          path: nudge-win-x64.zip

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone WaylandDotnet sibling repo
        run: git clone https://github.com/sguergachi/WaylandDotnet.git "${{ github.workspace }}/WaylandDotnet"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build and publish Linux binaries
        working-directory: NudgeCrossPlatform
        run: |
          # Create output directory
          mkdir -p dist/linux
          
          # Build and publish nudge (daemon)
          dotnet publish nudge.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o bin/Release/net10.0/linux-x64/publish_nudge --nologo
          
          # Build and publish nudge-notify
          dotnet publish nudge-notify.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o bin/Release/net10.0/linux-x64/publish_notify --nologo
          
          # Build and publish nudge-tray
          dotnet publish nudge-tray.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -f net10.0 -p:SkipBuildNudgeDaemon=true -o bin/Release/net10.0/linux-x64/publish_tray --nologo
          
          # Copy executables to dist/linux with expected names
          cp bin/Release/net10.0/linux-x64/publish_nudge/Nudge dist/linux/nudge || cp bin/Release/net10.0/linux-x64/publish_nudge/nudge dist/linux/nudge
          cp bin/Release/net10.0/linux-x64/publish_notify/NudgeNotify dist/linux/nudge-notify || cp bin/Release/net10.0/linux-x64/publish_notify/nudge-notify dist/linux/nudge-notify
          cp bin/Release/net10.0/linux-x64/publish_tray/NudgeTray dist/linux/nudge-tray || cp bin/Release/net10.0/linux-x64/publish_tray/nudge-tray dist/linux/nudge-tray
          
          # Copy DLL files for runtime
          find bin/Release/net10.0/linux-x64/publish_nudge -name "*.dll" -exec cp {} dist/linux/ \;
          find bin/Release/net10.0/linux-x64/publish_notify -name "*.dll" -exec cp {} dist/linux/ \;
          find bin/Release/net10.0/linux-x64/publish_tray -name "*.dll" -exec cp {} dist/linux/ \;

      - name: Package Linux artifacts
        run: |
          cd NudgeCrossPlatform
          dist=dist/linux
          
          # Copy supporting files
          cp model_inference.py       "$dist/"
          cp train_model.py           "$dist/"
          cp background_trainer.py    "$dist/"
          cp requirements-cpu.txt     "$dist/"
          cp requirements.txt         "$dist/"
          cp install-linux-app.sh     "$dist/"
          
          # Set execute permissions
          chmod +x "$dist/nudge" "$dist/nudge-notify" "$dist/nudge-tray" "$dist/install-linux-app.sh"
          
          # Create tarball in repo root
          tar -czf ../nudge-linux-x64.tar.gz -C dist linux

      - uses: actions/upload-artifact@v4
        with:
          name: nudge-linux-x64
          path: nudge-linux-x64.tar.gz

  release:
    needs: [check-version, build-windows, build-linux]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: nudge-win-x64

      - uses: actions/download-artifact@v4
        with:
          name: nudge-linux-x64

      - name: Tag and publish release
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$VERSION"
          git push origin "v$VERSION"
          cat > release-notes.md << 'NOTES'
          ## Install

          ### Windows
          1. Download **Nudge-Setup-*.exe** (installer) or **nudge-win-x64.zip** (portable)
          2. Run **nudge-tray.exe**

          ### Linux
          1. Download **nudge-linux-x64.tar.gz** and extract: `tar -xzf nudge-linux-x64.tar.gz`
          2. Run `./install-linux-app.sh` to register the desktop entry
          3. Launch **nudge-tray** from your app menu

          ### ML features
          When you enable ML mode (in Settings or via `--ml`), Nudge automatically:
          - Creates a Python virtual environment in `~/.nudge/venv/`
          - Installs scikit-learn, joblib, pandas, and numpy
          - No manual pip install needed

          ---
          **Feedback?** [Open an issue](https://github.com/sguergachi/Nudge/issues/new) — every report shapes what gets built next.
          NOTES
          gh release create "v$VERSION" \
            --title "Nudge v$VERSION" \
            --notes-file release-notes.md \
            nudge-win-x64.zip \
            nudge-linux-x64.tar.gz
