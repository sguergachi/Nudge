name: Release

on:
  push:
    branches: [master]
    paths-ignore:
      - docs/**
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Extract version and check if release needed
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep -oP 'const string VERSION = "\K[^"]+' NudgeCrossPlatform/nudge-tray.cs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if gh release view "v$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Release v$VERSION already exists — skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "No release for v$VERSION — will build and release."
          fi

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained Windows binaries
        working-directory: NudgeCrossPlatform
        run: |
          dotnet publish nudge.csproj        -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ../dist/nudge --nologo
          dotnet publish nudge-notify.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true -o ../dist/notify --nologo
          dotnet publish nudge-tray.csproj   -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true -f net10.0-windows10.0.17763.0 -p:SkipBuildNudgeDaemon=true -o ../dist/tray --nologo
          New-Item -ItemType Directory -Force -Path ../dist/win-x64
          Copy-Item ../dist/nudge/nudge.exe, ../dist/notify/nudge-notify.exe, ../dist/tray/nudge-tray.exe ../dist/win-x64/
          Copy-Item ../dist/tray/*.dll, ../dist/tray/*.exe, ../dist/tray/*.pdb ../dist/win-x64/ -ErrorAction SilentlyContinue
          Copy-Item ../dist/nudge/*.pdb, ../dist/notify/*.pdb ../dist/win-x64/ -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ../dist/nudge, ../dist/notify, ../dist/tray

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $dist = "dist/win-x64"
          Copy-Item "NudgeCrossPlatform/model_inference.py"       $dist
          Copy-Item "NudgeCrossPlatform/train_model.py"           $dist
          Copy-Item "NudgeCrossPlatform/background_trainer.py"    $dist
          Copy-Item "NudgeCrossPlatform/generate_sample_data.py"  $dist
          Copy-Item "NudgeCrossPlatform/requirements-cpu.txt"     $dist
          Copy-Item "NudgeCrossPlatform/requirements.txt"         $dist
          Copy-Item "NudgeCrossPlatform/assets/windows/nudge.ico" $dist
          # Bundle the pretrained V1 model so AI works on first launch
          $modelDest = Join-Path $dist "model"
          New-Item -ItemType Directory -Force -Path $modelDest | Out-Null
          Copy-Item "NudgeCrossPlatform/model/productivity_model.joblib" $modelDest
          Copy-Item "NudgeCrossPlatform/model/scaler.json"              $modelDest
          Copy-Item "NudgeCrossPlatform/model/trainer_meta.json"        $modelDest
          # Download and bundle the self-contained Python runtime
          $pyUrl = "https://github.com/astral-sh/python-build-standalone/releases/download/20260510/cpython-3.11.15+20260510-x86_64-pc-windows-msvc-install_only.tar.gz"
          $pyTmp = Join-Path $env:TEMP "nudge-python-runtime.tar.gz"
          Write-Host "Downloading bundled Python runtime..."
          Invoke-WebRequest -Uri $pyUrl -OutFile $pyTmp -UseBasicParsing
          $pyDest = Join-Path $dist "python-runtime"
          New-Item -ItemType Directory -Force -Path $pyDest | Out-Null
          tar -xzf $pyTmp --strip-components=1 -C $pyDest
          Remove-Item $pyTmp -Force
          Write-Host "Bundled Python runtime ready"
          Compress-Archive -Path "$dist/*" -DestinationPath "nudge-win-x64.zip" -Force

      - name: Upload Windows zip
        uses: actions/upload-artifact@v7
        with:
          name: nudge-win-x64
          path: nudge-win-x64.zip

      - name: Build Velopack installer
        shell: pwsh
        run: |
          dotnet tool install -g vpk
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          $m = Select-String -Path "NudgeCrossPlatform\nudge-tray.cs" -Pattern 'const string VERSION = "([^"]+)"'
          $version = if ($m) { $m.Matches[0].Groups[1].Value } else { "1.0.0" }
          Write-Host "Building Velopack installer for v$version..."
          vpk pack `
            --packId "Nudge" `
            --packVersion $version `
            --packDir "dist/win-x64" `
            --mainExe "nudge-tray.exe" `
            --icon "NudgeCrossPlatform/assets/windows/nudge.ico" `
            -o "dist/velopack"
          if ($LASTEXITCODE -ne 0) { throw "vpk pack failed (exit $LASTEXITCODE)" }
          $setup = "dist/velopack/Nudge-win-Setup.exe"
          if (Test-Path $setup) { Write-Host "Nudge-win-Setup.exe: $((Get-Item $setup).Length/1KB) KB" }
          else { throw "Nudge-win-Setup.exe not produced" }

      - name: Stage installers for upload
        if: success() || failure()
        shell: pwsh
        run: |
          Copy-Item dist/velopack/Nudge-win-Setup.exe . -ErrorAction SilentlyContinue

      - name: Upload Windows installers
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: nudge-win-installer
          path: Nudge-win-Setup.exe
          if-no-files-found: warn

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build and publish Linux binaries
        working-directory: NudgeCrossPlatform
        run: |
          mkdir -p dist/linux

          # Restore + publish each project sequentially (shared obj/ overwrites on restore)
          rm -rf obj
          dotnet restore nudge.csproj -r linux-x64 -p:PublishReadyToRun=true --nologo
          dotnet publish nudge.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true --no-restore -o bin/Release/net10.0/linux-x64/publish_nudge --nologo

          rm -rf obj
          dotnet restore nudge-notify.csproj -r linux-x64 -p:PublishReadyToRun=true --nologo
          dotnet publish nudge-notify.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true --no-restore -o bin/Release/net10.0/linux-x64/publish_notify --nologo

          rm -rf obj
          dotnet restore nudge-tray.csproj -r linux-x64 -p:PublishReadyToRun=true --nologo
          dotnet publish nudge-tray.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -p:PublishReadyToRun=true -f net10.0 -p:SkipBuildNudgeDaemon=true --no-restore -o bin/Release/net10.0/linux-x64/publish_tray --nologo

          # Copy executables (name matches project — nudge, nudge-notify, nudge-tray)
          cp bin/Release/net10.0/linux-x64/publish_nudge/nudge dist/linux/nudge
          cp bin/Release/net10.0/linux-x64/publish_notify/nudge-notify dist/linux/nudge-notify
          cp bin/Release/net10.0/linux-x64/publish_tray/nudge-tray dist/linux/nudge-tray

          # Copy remaining DLLs for runtime
          find bin/Release/net10.0/linux-x64/publish_nudge -name "*.dll" -exec cp {} dist/linux/ \;
          find bin/Release/net10.0/linux-x64/publish_notify -name "*.dll" -exec cp {} dist/linux/ \;
          find bin/Release/net10.0/linux-x64/publish_tray -name "*.dll" -exec cp {} dist/linux/ \;

      - name: Package Linux artifacts
        run: |
          cd NudgeCrossPlatform
          dist=dist/linux
          
          # Copy supporting files
          cp model_inference.py       "$dist/"
          cp train_model.py           "$dist/"
          cp background_trainer.py    "$dist/"
          cp generate_sample_data.py  "$dist/"
          cp requirements-cpu.txt     "$dist/"
          cp requirements.txt         "$dist/"
          cp install-linux-app.sh     "$dist/"
          cp assets/linux/nudge.svg   "$dist/nudge.svg" || true

          # Bundle the pretrained V1 model so AI works on first launch
          mkdir -p "$dist/model"
          cp model/productivity_model.joblib "$dist/model/"
          cp model/scaler.json               "$dist/model/"
          cp model/trainer_meta.json         "$dist/model/"
          
          # Download and bundle the self-contained Python runtime
          echo "Downloading bundled Python runtime..."
          PY_URL="https://github.com/astral-sh/python-build-standalone/releases/download/20260510/cpython-3.11.15+20260510-x86_64-unknown-linux-gnu-install_only.tar.gz"
          curl -fSL --progress-bar -o /tmp/nudge-python-runtime.tar.gz "$PY_URL"
          mkdir -p "$dist/python-runtime"
          tar -xzf /tmp/nudge-python-runtime.tar.gz --strip-components=1 -C "$dist/python-runtime"
          rm -f /tmp/nudge-python-runtime.tar.gz
          echo "Bundled Python runtime ready"

          # Set execute permissions
          chmod +x "$dist/nudge" "$dist/nudge-notify" "$dist/nudge-tray" "$dist/install-linux-app.sh"
          chmod +x "$dist/python-runtime/bin/python3" 2>/dev/null || true
          
          # Create portable tarball
          tar -czf ../nudge-linux-x64.tar.gz -C dist linux
          
          # Create self-extracting installer (.run)
          cp nudge-linux-installer.sh ../nudge-linux-installer.run
          tar -czf /tmp/nudge-payload.tar.gz -C dist linux
          cat /tmp/nudge-payload.tar.gz >> ../nudge-linux-installer.run
          chmod +x ../nudge-linux-installer.run
          rm /tmp/nudge-payload.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: nudge-linux-x64
          path: nudge-linux-x64.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: nudge-linux-installer
          path: nudge-linux-installer.run

  release:
    needs: [check-version, build-windows, build-linux]
    if: always() && needs.check-version.result == 'success' && needs.check-version.outputs.should_release == 'true' && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-win-x64

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-linux-x64

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-win-installer

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-linux-installer

      - name: Tag and publish release
        run: |
          ASSETS=()
          for f in Nudge-win-Setup.exe nudge-win-x64.zip nudge-linux-installer.run nudge-linux-x64.tar.gz; do
            [ -f "$f" ] && ASSETS+=("$f")
          done
          echo "Release assets: ${ASSETS[*]}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Generate changelog from commits since the previous release tag
          PREV_TAG=$(git tag --sort=-version:refname | grep "^v" | head -1)
          if [ -n "$PREV_TAG" ]; then
            printf "## What's Changed\n\n" > release-notes.md
            git log --pretty=format:"- %s" "$PREV_TAG..HEAD" | grep -v "^- $" | head -50 >> release-notes.md
            printf "\n\n---\n\n" >> release-notes.md
          else
            > release-notes.md
          fi

          cat .github/release-notes-footer.md >> release-notes.md

          git tag "v$VERSION" 2>/dev/null || echo "Tag v$VERSION already exists, reusing it"
          git push origin "v$VERSION" 2>/dev/null || echo "Tag v$VERSION already pushed, continuing"
          gh release create "v$VERSION" \
            --title "Nudge v$VERSION" \
            --notes-file release-notes.md \
            $([[ "$VERSION" == *-* ]] && echo --prerelease) \
            "${ASSETS[@]}"
