name: Release

on:
  push:
    branches: [master]
    paths-ignore:
      - docs/**
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      should_release: ${{ steps.ver.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Extract version and check if release needed
        id: ver
        run: |
          VERSION=$(grep -oP 'const string VERSION = "\K[^"]+' NudgeCrossPlatform/nudge-tray.cs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q "v$VERSION"; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$VERSION already exists — skipping release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "New version v$VERSION — will create release."
          fi

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Publish self-contained Windows binaries
        working-directory: NudgeCrossPlatform
        run: |
          dotnet publish nudge.csproj        -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o ../dist/nudge --nologo
          dotnet publish nudge-notify.csproj -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -o ../dist/notify --nologo
          dotnet publish nudge-tray.csproj   -c Release -r win-x64 --self-contained -p:PublishSingleFile=true -f net10.0-windows10.0.17763.0 -p:SkipBuildNudgeDaemon=true -o ../dist/tray --nologo
          New-Item -ItemType Directory -Force -Path ../dist/win-x64
          Copy-Item ../dist/nudge/nudge.exe, ../dist/notify/nudge-notify.exe, ../dist/tray/nudge-tray.exe ../dist/win-x64/
          Copy-Item ../dist/tray/*.dll, ../dist/tray/*.exe, ../dist/tray/*.pdb ../dist/win-x64/ -ErrorAction SilentlyContinue
          Copy-Item ../dist/nudge/*.pdb, ../dist/notify/*.pdb ../dist/win-x64/ -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force ../dist/nudge, ../dist/notify, ../dist/tray

      - name: Package Windows artifacts
        shell: pwsh
        run: |
          $dist = "dist/win-x64"
          Copy-Item "NudgeCrossPlatform/model_inference.py"       $dist
          Copy-Item "NudgeCrossPlatform/train_model.py"           $dist
          Copy-Item "NudgeCrossPlatform/background_trainer.py"    $dist
          Copy-Item "NudgeCrossPlatform/requirements-cpu.txt"     $dist
          Copy-Item "NudgeCrossPlatform/requirements.txt"         $dist
          Copy-Item "NudgeCrossPlatform/assets/windows/nudge.ico" $dist
          Compress-Archive -Path "$dist/*" -DestinationPath "nudge-win-x64.zip" -Force

      - name: Upload Windows zip
        uses: actions/upload-artifact@v7
        with:
          name: nudge-win-x64
          path: nudge-win-x64.zip

      - name: Install WiX and build MSI
        shell: pwsh
        run: |
          choco install wixtoolset -y --no-progress
          refreshenv
          $candle = where.exe candle 2>$null
          if (-not $candle) { $candle = where.exe candle.exe 2>$null }
          if (-not $candle) { $candle = Get-ChildItem "C:\Program Files (x86)\WiX*\bin\candle.exe" | Select-Object -First 1 -ExpandProperty FullName }
          if (-not $candle) { Write-Host "candle not found"; Get-ChildItem "C:\Program Files (x86)\WiX*" -Recurse -Filter "candle.exe" -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $_" }; throw "candle.exe not found" }
          Write-Host "candle: $candle"
          $light = $candle -replace 'candle\.exe$', 'light.exe'
          $m = Select-String -Path "NudgeCrossPlatform\nudge-tray.cs" -Pattern 'const string VERSION = "([.\d]+)"'
          $version = if ($m) { $m.Matches[0].Groups[1].Value } else { "1.5.3" }
          Write-Host "version: $version"
          $outDir = Join-Path $PWD "dist"

          Write-Host "Generating installer bitmaps..."
          Add-Type -AssemblyName System.Drawing
          $banner = New-Object System.Drawing.Bitmap 493, 58
          $g = [System.Drawing.Graphics]::FromImage($banner)
          $g.SmoothingMode = 'HighQuality'
          $g.TextRenderingHint = 'AntiAliasGridFit'
          $rect = New-Object System.Drawing.Rectangle 0, 0, 493, 58
          $brushBg = New-Object System.Drawing.Drawing2D.LinearGradientBrush $rect, ([System.Drawing.Color]::FromArgb(30,30,46)), ([System.Drawing.Color]::FromArgb(15,15,25)), 0
          $g.FillRectangle($brushBg, $rect)
          $font = New-Object System.Drawing.Font "Segoe UI", 18, [System.Drawing.FontStyle]::Bold
          $g.DrawString("Nudge", $font, [System.Drawing.Brushes]::White, 18, 10)
          $font2 = New-Object System.Drawing.Font "Segoe UI", 8
          $g.DrawString("Stay focused. Stay productive.", $font2, [System.Drawing.SolidBrush]::new([System.Drawing.Color]::FromArgb(160,160,180)), 18, 36)
          $pen = New-Object System.Drawing.Pen ([System.Drawing.Color]::FromArgb(180,140,255)), 2
          $g.DrawLine($pen, 18, 32, 140, 32)
          $banner.Save("$outDir\banner.bmp")
          $g.Dispose(); $banner.Dispose()

          $dialog = New-Object System.Drawing.Bitmap 493, 312
          $g = [System.Drawing.Graphics]::FromImage($dialog)
          $g.SmoothingMode = 'HighQuality'
          $rect = New-Object System.Drawing.Rectangle 0, 0, 493, 312
          $brushBg = New-Object System.Drawing.Drawing2D.LinearGradientBrush $rect, ([System.Drawing.Color]::FromArgb(25,25,40)), ([System.Drawing.Color]::FromArgb(10,10,18)), 90
          $g.FillRectangle($brushBg, $rect)
          $g.DrawString("Nudge", $font, [System.Drawing.SolidBrush]::new([System.Drawing.Color]::FromArgb(200,200,220,80)), 30, 120)
          $font3 = New-Object System.Drawing.Font "Segoe UI", 11
          $g.DrawString("Stay focused. Stay productive.", $font3, [System.Drawing.SolidBrush]::new([System.Drawing.Color]::FromArgb(200,200,220,40)), 32, 155)
          $dialog.Save("$outDir\dialog.bmp")
          $g.Dispose(); $dialog.Dispose()
          Write-Host "Bitmaps generated."

          $wxs = Resolve-Path "NudgeCrossPlatform\assets\windows\installer.wxs"
          $wxsDir = (Get-Item $wxs).Directory.FullName
          $msi = Join-Path $outDir "Nudge-Setup-$version.msi"
          Write-Host "Compiling..."
          Push-Location $wxsDir
          & $candle -out "$outDir\installer.wixobj" "installer.wxs" 2>&1
          if ($LASTEXITCODE -ne 0) { Pop-Location; throw "candle failed (exit $LASTEXITCODE)" }
          Write-Host "Linking..."
          & $light -out $msi "$outDir\installer.wixobj" -ext WixUIExtension -sw 2>&1
          Pop-Location
          if ($LASTEXITCODE -ne 0) { throw "light failed (exit $LASTEXITCODE)" }
          if (Test-Path $msi) { Write-Host "MSI: $((Get-Item $msi).Length/1KB) KB" }
          else { throw "MSI not produced" }
          Copy-Item $msi (Join-Path $outDir "Nudge-Setup.msi")

      - name: Upload Windows MSI installer
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: nudge-win-installer
          path: dist\Nudge-Setup*.msi
          if-no-files-found: warn

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Clone WaylandDotnet sibling repo
        continue-on-error: true
        run: git clone https://github.com/sguergachi/WaylandDotnet.git "${{ github.workspace }}/Nudge/WaylandDotnet" 2>/dev/null || echo "WaylandDotnet not available — continuing"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Build and publish Linux binaries
        working-directory: NudgeCrossPlatform
        run: |
          # Create output directory
          mkdir -p dist/linux
          
          # Build and publish nudge (daemon)
          dotnet publish nudge.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o bin/Release/net10.0/linux-x64/publish_nudge --nologo
          
          # Build and publish nudge-notify
          dotnet publish nudge-notify.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -o bin/Release/net10.0/linux-x64/publish_notify --nologo
          
          # Build and publish nudge-tray
          dotnet publish nudge-tray.csproj -c Release -r linux-x64 --self-contained -p:PublishSingleFile=true -f net10.0 -p:SkipBuildNudgeDaemon=true -o bin/Release/net10.0/linux-x64/publish_tray --nologo
          
          # Copy executables to dist/linux with expected names
          cp bin/Release/net10.0/linux-x64/publish_nudge/Nudge dist/linux/nudge || cp bin/Release/net10.0/linux-x64/publish_nudge/nudge dist/linux/nudge
          cp bin/Release/net10.0/linux-x64/publish_notify/NudgeNotify dist/linux/nudge-notify || cp bin/Release/net10.0/linux-x64/publish_notify/nudge-notify dist/linux/nudge-notify
          cp bin/Release/net10.0/linux-x64/publish_tray/NudgeTray dist/linux/nudge-tray || cp bin/Release/net10.0/linux-x64/publish_tray/nudge-tray dist/linux/nudge-tray
          
          # Copy DLL files for runtime
          find bin/Release/net10.0/linux-x64/publish_nudge -name "*.dll" -exec cp {} dist/linux/ \;
          find bin/Release/net10.0/linux-x64/publish_notify -name "*.dll" -exec cp {} dist/linux/ \;
          find bin/Release/net10.0/linux-x64/publish_tray -name "*.dll" -exec cp {} dist/linux/ \;

      - name: Package Linux artifacts
        run: |
          cd NudgeCrossPlatform
          dist=dist/linux
          
          # Copy supporting files
          cp model_inference.py       "$dist/"
          cp train_model.py           "$dist/"
          cp background_trainer.py    "$dist/"
          cp requirements-cpu.txt     "$dist/"
          cp requirements.txt         "$dist/"
          cp install-linux-app.sh     "$dist/"
          cp assets/linux/nudge.svg   "$dist/nudge.svg" || true
          
          # Set execute permissions
          chmod +x "$dist/nudge" "$dist/nudge-notify" "$dist/nudge-tray" "$dist/install-linux-app.sh"
          
          # Create portable tarball
          tar -czf ../nudge-linux-x64.tar.gz -C dist linux
          
          # Create self-extracting installer (.run)
          cp nudge-linux-installer.sh ../nudge-linux-installer.run
          tar -czf /tmp/nudge-payload.tar.gz -C dist linux
          cat /tmp/nudge-payload.tar.gz >> ../nudge-linux-installer.run
          chmod +x ../nudge-linux-installer.run
          rm /tmp/nudge-payload.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: nudge-linux-x64
          path: nudge-linux-x64.tar.gz

      - uses: actions/upload-artifact@v7
        with:
          name: nudge-linux-installer
          path: nudge-linux-installer.run

  release:
    needs: [check-version, build-windows, build-linux]
    if: always() && needs.check-version.result == 'success' && needs.check-version.outputs.should_release == 'true' && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-win-x64

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-linux-x64

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-win-installer

      - uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: nudge-linux-installer

      - name: Tag and publish release
        run: |
          ASSETS=()
           for f in Nudge-Setup-*.msi nudge-win-x64.zip nudge-linux-installer.run nudge-linux-x64.tar.gz; do
             [ -f "$f" ] && ASSETS+=("$f")
           done
           echo "Release assets: ${ASSETS[*]}"
           git config user.name  "github-actions[bot]"
           git config user.email "github-actions[bot]@users.noreply.github.com"
           git tag "v$VERSION"
           git push origin "v$VERSION"
           cat > release-notes.md << 'NOTES'
           ## Install

           ### Windows
           1. Download **Nudge Setup** (`.msi`) — recommended: installs with Start Menu/Desktop shortcuts and auto-launches
           2. Or download **nudge-win-x64.zip** and run **nudge-tray.exe**

          ### Linux
          1. Download **nudge-linux-installer.run** and run: `chmod +x nudge-linux-installer.run && ./nudge-linux-installer.run`
          2. Or use **nudge-linux-x64.tar.gz**: extract and run `./install-linux-app.sh`

          ### ML features
          When you enable ML mode (in Settings or via `--ml`), Nudge automatically:
          - Creates a Python virtual environment in `~/.nudge/venv/`
          - Installs scikit-learn, joblib, pandas, and numpy
          - No manual pip install needed

          ---
          **Feedback?** [Open an issue](https://github.com/sguergachi/Nudge/issues/new) — every report shapes what gets built next.
          NOTES
          gh release create "v$VERSION" \
            --title "Nudge v$VERSION" \
            --notes-file release-notes.md \
            "${ASSETS[@]}"
