<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 144" width="340" height="144">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#58A6FF" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="timerCalm" x1="0" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#9696A5" stop-opacity="0.63"/>
    </linearGradient>
  </defs>

  <!-- Window background -->
  <rect x="0" y="0" width="340" height="144" rx="12" ry="12" fill="#121214" fill-opacity="0.98" filter="url(#shadow)"/>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="339" height="143" rx="11.5" ry="11.5" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>

  <!-- Close button -->
  <circle cx="316" cy="18" r="8" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="312" y1="14" x2="320" y2="22" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="320" y1="14" x2="312" y2="22" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Title -->
  <text x="18" y="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#A0A0AA" font-weight="400">Nudge</text>

  <!-- Message -->
  <text x="18" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#E8E8EE" font-weight="600">Been on this for a while.</text>
  <text x="18" y="66" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#E8E8EE" font-weight="600">Still focused?</text>

  <!-- YES button -->
  <rect x="18" y="90" width="78" height="32" rx="6" ry="6" fill="#58A6FF"/>
  <text x="57" y="110" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#FFF" font-weight="500" text-anchor="middle">Yes</text>
  <!-- YES shortcut -->
  <rect x="74" y="101" width="20" height="14" rx="3" ry="3" fill="rgba(255,255,255,0.15)"/>
  <text x="84" y="111" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)" font-weight="500" text-anchor="middle">Y</text>

  <!-- NO button -->
  <rect x="108" y="90" width="78" height="32" rx="6" ry="6" fill="#34343A"/>
  <text x="147" y="110" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#D2D2DC" font-weight="500" text-anchor="middle">No</text>
  <!-- NO shortcut -->
  <rect x="164" y="101" width="20" height="14" rx="3" ry="3" fill="rgba(255,255,255,0.1)"/>
  <text x="174" y="111" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.9)" font-weight="500" text-anchor="middle">N</text>

  <!-- Timer ring -->
  <g transform="translate(290, 72)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2.5"/>
    <!-- Timer arc (~75% remaining) -->
    <path d="M 0,-22 A 22,22 0 0,1 21.5,4.4" fill="none" stroke="#9696A5" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.63"/>
    <!-- Timer text -->
    <text x="0" y="3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="rgba(180,180,190,0.78)" text-anchor="middle" font-weight="400">22</text>
  </g>
</svg>
