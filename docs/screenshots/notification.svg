<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 148" width="340" height="148">
  <!-- Window -->
  <rect x="0" y="0" width="340" height="148" rx="14" fill="#121215" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

  <!-- Close button -->
  <circle cx="318" cy="18" r="7" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <line x1="314" y1="14" x2="322" y2="22" stroke="rgba(255,255,255,0.20)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="322" y1="14" x2="314" y2="22" stroke="rgba(255,255,255,0.20)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Title -->
  <text x="16" y="22" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#94949E">Nudge</text>

  <!-- Message -->
  <text x="16" y="48" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#EDEDF5" font-weight="600">Been on this for a while.</text>
  <text x="16" y="66" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#EDEDF5" font-weight="600">Still focused?</text>

  <!-- YES button -->
  <rect x="16" y="90" width="80" height="34" rx="7" fill="#58A6FF"/>
  <text x="56" y="112" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#fff" font-weight="600" text-anchor="middle">Yes</text>
  <rect x="72" y="101" width="22" height="15" rx="4" fill="rgba(255,255,255,0.15)"/>
  <text x="83" y="112" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#fff" font-weight="500" text-anchor="middle">Y</text>

  <!-- NO button -->
  <rect x="108" y="90" width="80" height="34" rx="7" fill="#24242B"/>
  <text x="148" y="112" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#D2D2DC" font-weight="600" text-anchor="middle">No</text>
  <rect x="164" y="101" width="22" height="15" rx="4" fill="rgba(255,255,255,0.08)"/>
  <text x="175" y="112" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)" font-weight="500" text-anchor="middle">N</text>

  <!-- Timer -->
  <g transform="translate(290, 74)">
    <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2.5"/>
    <path d="M 0,-22 A 22,22 0 0,1 21.5,4.4" fill="none" stroke="#94949E" stroke-width="2.5" stroke-linecap="round" stroke-opacity="0.6"/>
    <text x="0" y="3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#94949E" text-anchor="middle">22</text>
  </g>
</svg>