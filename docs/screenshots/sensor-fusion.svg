  <text x="326" y="134" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="7.5" fill="#5C5C66" text-anchor="middle">Trusted · Usable · Poor</text>

  <rect x="246" y="150" width="160" height="36" rx="5" fill="rgba(255,255,255,0.04)"/>
  <text x="326" y="165" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#58A6FF" text-anchor="middle" font-weight="600">Rolling window</text>
  <text x="326" y="178" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="7.5" fill="#5C5C66" text-anchor="middle">300 s of observations</text>

  <rect x="246" y="194" width="160" height="36" rx="5" fill="rgba(255,255,255,0.04)"/>
  <text x="326" y="209" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#58A6FF" text-anchor="middle" font-weight="600">Pattern extraction</text>
