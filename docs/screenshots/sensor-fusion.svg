  <line x1="196" y1="66" x2="232" y2="66" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="416" y1="66" x2="452" y2="66" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="636" y1="66" x2="672" y2="66" stroke="#58A6FF" stroke-opacity="0.3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Column 1: Signal Sources ── -->
  <rect x="16" y="96" width="180" height="52" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="24" y="104" width="16" height="16" rx="3" fill="rgba(88,166,255,0.15)"/>
  <text x="33" y="117" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#58A6FF" text-anchor="middle" font-weight="600">A</text>
