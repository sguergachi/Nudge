  <rect x="246" y="238" width="160" height="26" rx="5" fill="rgba(34,197,94,0.06)"/>
  <text x="326" y="256" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#22C55E" text-anchor="middle" font-weight="600">Category confidence (5 tiers)</text>

  <!-- Arrows from signals to fusion zone -->
  <line x1="196" y1="122" x2="232" y2="122" stroke="#58A6FF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="196" y1="184" x2="232" y2="184" stroke="#58A6FF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="196" y1="246" x2="232" y2="246" stroke="#58A6FF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ── Column 3: Feature Vector ── -->
  <rect x="456" y="96" width="180" height="176" rx="8" fill="#121215" stroke="rgba(88,166,255,0.08)" stroke-width="1"/>

  <rect x="466" y="106" width="160" height="80" rx="5" fill="rgba(88,166,255,0.04)"/>
  <text x="546" y="124" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#58A6FF" text-anchor="middle" font-weight="600">21 features</text>
