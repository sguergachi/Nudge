  <text x="24" y="138" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#5C5C66">Window title, process name, browser domain</text>

  <rect x="16" y="158" width="180" height="52" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="24" y="166" width="16" height="16" rx="3" fill="rgba(88,166,255,0.15)"/>
  <text x="33" y="179" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#58A6FF" text-anchor="middle" font-weight="600">I</text>
  <text x="50" y="177" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#EDEDF5" font-weight="600">Idle state</text>
  <text x="24" y="200" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#5C5C66">Seconds since last input event</text>

  <rect x="16" y="220" width="180" height="52" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="24" y="228" width="16" height="16" rx="3" fill="rgba(88,166,255,0.15)"/>
  <text x="33" y="241" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#58A6FF" text-anchor="middle" font-weight="600">W</text>
  <text x="50" y="239" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="11" fill="#EDEDF5" font-weight="600">Window transitions</text>
  <text x="24" y="262" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#5C5C66">Switch frequency, app count, time-per-app</text>

