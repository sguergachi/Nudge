  <rect x="236" y="96" width="180" height="176" rx="8" fill="#121215" stroke="rgba(88,166,255,0.08)" stroke-width="1"/>

  <rect x="246" y="106" width="160" height="36" rx="5" fill="rgba(255,255,255,0.04)"/>
