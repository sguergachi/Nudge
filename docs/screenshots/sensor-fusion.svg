  <g transform="translate(686, 104)">
    <rect x="0" y="0" width="55" height="22" rx="4" fill="rgba(88,166,255,0.08)"/>
    <text x="27" y="15" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#58A6FF" text-anchor="middle" font-weight="600">Development</text>

    <rect x="0" y="26" width="55" height="22" rx="4" fill="rgba(34,197,94,0.08)"/>
    <text x="27" y="41" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#22C55E" text-anchor="middle" font-weight="600">Creative</text>

    <rect x="0" y="52" width="55" height="22" rx="4" fill="rgba(88,166,255,0.08)"/>
    <text x="27" y="67" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#58A6FF" text-anchor="middle" font-weight="600">Office</text>

    <rect x="0" y="78" width="55" height="22" rx="4" fill="rgba(34,197,94,0.08)"/>
    <text x="27" y="93" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#22C55E" text-anchor="middle" font-weight="600">Comm</text>

    <rect x="0" y="104" width="55" height="22" rx="4" fill="rgba(88,166,255,0.08)"/>
    <text x="27" y="119" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#58A6FF" text-anchor="middle" font-weight="600">Entertain</text>

    <rect x="0" y="130" width="55" height="22" rx="4" fill="rgba(34,197,94,0.08)"/>
    <text x="27" y="145" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#22C55E" text-anchor="middle" font-weight="600">Utility</text>
  </g>

  <rect x="686" y="256" width="110" height="16" rx="4" fill="rgba(255,255,255,0.03)"/>
  <text x="741" y="267" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="7.5" fill="#5C5C66" text-anchor="middle">6 categories, 5 tiers</text>

  <!-- Arrow features → output -->
  <line x1="636" y1="184" x2="672" y2="184" stroke="#58A6FF" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Bottom bar: data flow summary -->
  <rect x="16" y="292" width="788" height="1" fill="rgba(255,255,255,0.04)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#5C5C66">
    <text x="24" y="316">Sources: KWin Script · X11 EWMH · Sway IPC · Win32</text>
    <text x="24" y="330">Flow: 1 Hz sampling → 60 s snapshots → local TCP inference → YES/NO interrupt</text>
    <text x="24" y="344">Privacy: All data in ~/.nudge/ · No network egress · No accounts · No telemetry</text>
  </g>

  <!-- ─── Feedback loop annotation ─── -->
  <path d="M 778 254 L 778 368 L 546 368 L 546 308" fill="none" stroke="rgba(34,197,94,0.15)" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="660" y="362" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="7" fill="#22C55E" text-anchor="middle" opacity="0.5">← every YES/NO retrains the model</text>
</svg>