  <text x="474" y="148" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#94949E">App category</text>
  <text x="548" y="148" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#94949E">Idle ratio</text>
  <text x="474" y="162" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#94949E">Switch velocity</text>
  <text x="548" y="162" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#94949E">Anchor return</text>
  <text x="474" y="176" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#94949E">Domain signals</text>
  <text x="550" y="176" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#5C5C66">+14 temporal</text>

  <rect x="466" y="196" width="160" height="40" rx="5" fill="rgba(34,197,94,0.04)"/>
  <text x="546" y="212" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#22C55E" text-anchor="middle" font-weight="600">Inference</text>
  <text x="546" y="226" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="8" fill="#5C5C66" text-anchor="middle">scikit-learn · TCP 127.0.0.1:45002</text>

  <rect x="466" y="244" width="160" height="22" rx="5" fill="rgba(255,255,255,0.03)"/>
  <text x="546" y="258" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="7.5" fill="#5C5C66" text-anchor="middle">≥98% confidence → interrupt</text>

