  <text x="24" y="34" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#EDEDF5" font-weight="700">Sensor Fusion Pipeline</text>

  <!-- Column headers -->
  <rect x="16" y="52" width="180" height="28" rx="5" fill="#121215"/>
  <text x="106" y="71" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#94949E" text-anchor="middle" font-weight="600">RAW SIGNALS</text>

  <rect x="236" y="52" width="180" height="28" rx="5" fill="#121215"/>
  <text x="326" y="71" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#94949E" text-anchor="middle" font-weight="600">SIGNAL FUSION</text>

  <rect x="456" y="52" width="180" height="28" rx="5" fill="#121215"/>
  <text x="546" y="71" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#94949E" text-anchor="middle" font-weight="600">FEATURE VECTOR</text>

  <rect x="676" y="52" width="130" height="28" rx="5" fill="#121215"/>
  <text x="741" y="71" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#94949E" text-anchor="middle" font-weight="600">OUTPUT</text>

