<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 260" width="680" height="260">
  <rect x="0" y="0" width="680" height="260" rx="12" fill="#0B0B0E" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="32" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="14" fill="#EDEDF5" font-weight="700">App categories</text>

  <!-- 6 category badges (2×3 grid, consistent palette) -->
  <g transform="translate(16, 56)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="200" height="46" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="10" y="17" width="12" height="12" rx="3" fill="#58A6FF"/>
    <text x="30" y="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#EDEDF5" font-weight="600">Development</text>
    <text x="192" y="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#5C5C66" text-anchor="end">VS Code, Terminal</text>

    <rect x="216" y="0" width="200" height="46" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="226" y="17" width="12" height="12" rx="3" fill="#22C55E"/>
    <text x="246" y="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#EDEDF5" font-weight="600">Creative &amp; Design</text>
    <text x="408" y="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#5C5C66" text-anchor="end">Figma, Blender</text>

    <rect x="432" y="0" width="200" height="46" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="442" y="17" width="12" height="12" rx="3" fill="#58A6FF"/>
    <text x="462" y="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#EDEDF5" font-weight="600">Office &amp; Writing</text>
    <text x="624" y="28" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#5C5C66" text-anchor="end">Obsidian, Docs</text>

    <!-- Row 2 -->
    <rect x="0" y="62" width="200" height="46" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="10" y="79" width="12" height="12" rx="3" fill="#22C55E"/>
    <text x="30" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#EDEDF5" font-weight="600">Communication</text>
    <text x="192" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#5C5C66" text-anchor="end">Slack, Discord</text>

    <rect x="216" y="62" width="200" height="46" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="226" y="79" width="12" height="12" rx="3" fill="#58A6FF"/>
    <text x="246" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#EDEDF5" font-weight="600">Entertainment</text>
    <text x="408" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#5C5C66" text-anchor="end">YouTube, Spotify</text>

    <rect x="432" y="62" width="200" height="46" rx="6" fill="#121215" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <rect x="442" y="79" width="12" height="12" rx="3" fill="#22C55E"/>
    <text x="462" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#EDEDF5" font-weight="600">Utility</text>
    <text x="624" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#5C5C66" text-anchor="end">Settings, System</text>
  </g>

  <!-- Divider -->
  <line x1="16" y1="184" x2="664" y2="184" stroke="rgba(255,255,255,0.06)"/>

  <!-- Confidence tiers (5 steps, horizontal) -->
  <text x="24" y="206" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="10" fill="#94949E" font-weight="600">CONFIDENCE TIERS</text>

  <g transform="translate(24, 218)">
    <rect x="0" y="0" width="110" height="26" rx="4" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.20)" stroke-width="1"/>
    <text x="55" y="17" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#22C55E" text-anchor="middle" font-weight="600">Override</text>

    <rect x="120" y="0" width="110" height="26" rx="4" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.20)" stroke-width="1"/>
    <text x="175" y="17" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#22C55E" text-anchor="middle" font-weight="600">Desktop</text>

    <rect x="240" y="0" width="110" height="26" rx="4" fill="rgba(88,166,255,0.08)" stroke="rgba(88,166,255,0.20)" stroke-width="1"/>
    <text x="295" y="17" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#58A6FF" text-anchor="middle" font-weight="600">Semantic</text>

    <rect x="360" y="0" width="110" height="26" rx="4" fill="rgba(88,166,255,0.06)" stroke="rgba(88,166,255,0.12)" stroke-width="1"/>
    <text x="415" y="17" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#58A6FF" text-anchor="middle" font-weight="600">Inferred</text>

    <rect x="480" y="0" width="110" height="26" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="535" y="17" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="9" fill="#5C5C66" text-anchor="middle" font-weight="600">Fallback</text>
  </g>
